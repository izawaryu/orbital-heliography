<svg viewBox="0 0 500 400" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" style="background: #0d1117; width: 100%; height: 100%;">
  <defs>
    <!-- Soft glows -->
    <filter id="sun-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="sat-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Title / Heading -->
  <text x="250" y="30" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="0.5">Celestial Dome Coordinate Projection</text>
  <text x="250" y="48" fill="#8b949e" font-family="monospace" font-size="9" text-anchor="middle">Horizontal &amp; Angular Target Separation Grid</text>

  <!-- Dome Surface Grid: Almucantars (Horizontal Latitude Circles) -->
  <!-- Almucantar at h=30 deg -->
  <path d="M 120 236 A 138.6 37.5 0 0 1 380 236" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.8" stroke-dasharray="4,4" />
  <path d="M 380 236 A 138.6 37.5 0 0 1 120 236" stroke="rgba(255, 255, 255, 0.08)" stroke-width="0.8" />

  <!-- Almucantar at h=60 deg -->
  <path d="M 178 180 A 80 21.6 0 0 1 322 180" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.8" stroke-dasharray="4,4" />
  <path d="M 322 180 A 80 21.6 0 0 1 178 180" stroke="rgba(255, 255, 255, 0.08)" stroke-width="0.8" />

  <!-- Dome Meridians (Vertical Grid Profiles) -->
  <path d="M 90 260 A 160 160 0 0 1 410 260" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.2" />

  <!-- Back Horizon (Dashed) -->
  <path d="M 90 260 A 160 50 0 0 1 410 260" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-dasharray="4,4" />

  <!-- Ground Plane (Local Horizon) Fill -->
  <ellipse cx="250" cy="260" rx="160" ry="50" fill="rgba(255, 255, 255, 0.02)" stroke="none" />

  <!-- Zenith Axis (Vertical Line G -> Z) -->
  <line x1="250" y1="260" x2="250" y2="100" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1" stroke-dasharray="3,3" />

  <!-- Radial Vectors on Ground Plane (to H_sun and H_sat on the rim) -->
  <!-- G -> H_sun (11 o'clock) -->
  <line x1="250" y1="260" x2="170" y2="217" stroke="#ffd700" stroke-width="1.2" stroke-dasharray="2,2" />
  <!-- G -> H_sat (1 o'clock) -->
  <line x1="250" y1="260" x2="330" y2="217" stroke="#00f0f0" stroke-width="1.2" stroke-dasharray="2,2" />

  <!-- Ground Plane Azimuth Arc (ΔA) -->
  <path d="M 236 252 A 30 15 0 0 1 264 252" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1" fill="none" stroke-dasharray="2,1" />

  <!-- Vertical Coordinate Slice 1 (Sun sector at 11 o'clock) -->
  <path d="M 250 260 L 170 217 Q 170 152 195 120 Z" fill="rgba(255, 215, 0, 0.04)" />
  <line x1="250" y1="260" x2="195" y2="120" stroke="#ffd700" stroke-width="1.5" />
  
  <!-- Sun Altitude Arc: Horizon rim (H_sun) to Sun (S) only (spherical curved - balanced) -->
  <path d="M 170 217 Q 170 152 195 120" stroke="#ffd700" stroke-width="2.2" />

  <!-- Vertical Coordinate Slice 2 (Satellite sector at 1 o'clock) -->
  <path d="M 250 260 L 330 217 Q 330 170 305 143 Z" fill="rgba(0, 240, 240, 0.03)" />
  <line x1="250" y1="260" x2="305" y2="143" stroke="#00f0f0" stroke-width="1.5" />
  
  <!-- Satellite Altitude Arc: Horizon rim (H_sat) to Satellite (Sat) only (spherical curved - balanced) -->
  <path d="M 330 217 Q 330 170 305 143" stroke="#00f0f0" stroke-width="2.2" />

  <!-- Great Circle Segment / Angular separation γ directly connecting Sun & Satellite -->
  <path d="M 195 120 Q 250 135 305 143" stroke="#c080ff" stroke-width="3" />

  <!-- Front Horizon (Solid Rim) -->
  <path d="M 410 260 A 160 50 0 0 1 90 260" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.2" />

  <!-- Ground Points -->
  <!-- G (Heliostat center) -->
  <circle cx="250" cy="260" r="3.5" fill="#ffffff" stroke="#111" stroke-width="1" />
  <text x="250" y="278" fill="#ffffff" font-family="monospace" font-size="9" text-anchor="middle">G (Heliostat)</text>

  <!-- Horizon projections on the rim -->
  <!-- H_sun (11 o'clock) -->
  <circle cx="170" cy="217" r="2.5" fill="#ffd700" />
  <text x="160" y="217" fill="#ffd700" font-family="monospace" font-size="8.5" text-anchor="end">H_sun (11:00)</text>
  <!-- H_sat (1 o'clock) -->
  <circle cx="330" cy="217" r="2.5" fill="#00f0f0" />
  <text x="340" y="217" fill="#00f0f0" font-family="monospace" font-size="8.5" text-anchor="start">H_sat (1:00)</text>

  <!-- Sky Points (Sun & Satellite) exactly on their respective arcs -->
  <!-- Sun (S) -->
  <g filter="url(#sun-glow)">
    <circle cx="195" cy="120" r="8" fill="rgba(255, 215, 0, 0.2)" stroke="#ffd700" stroke-width="1.5" />
    <line x1="195" y1="108" x2="195" y2="111" stroke="#ffd700" stroke-width="0.8" />
    <line x1="195" y1="129" x2="195" y2="132" stroke="#ffd700" stroke-width="0.8" />
    <line x1="183" y1="120" x2="186" y2="120" stroke="#ffd700" stroke-width="0.8" />
    <line x1="204" y1="120" x2="207" y2="120" stroke="#ffd700" stroke-width="0.8" />
  </g>
  <text x="195" y="104" fill="#ffd700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Sun (S)</text>

  <!-- Satellite (Sat) -->
  <g transform="translate(305, 143)" filter="url(#sat-glow)">
    <rect x="-2.5" y="-4" width="5" height="8" rx="0.8" fill="rgba(0, 240, 240, 0.2)" stroke="#00f0f0" stroke-width="1" />
    <line x1="-10" y1="0" x2="10" y2="0" stroke="#00f0f0" stroke-width="1" />
    <rect x="-9" y="-2" width="5" height="4" rx="0.5" fill="rgba(0, 240, 240, 0.1)" stroke="#00f0f0" stroke-width="0.8" />
    <rect x="4" y="-2" width="5" height="4" rx="0.5" fill="rgba(0, 240, 240, 0.1)" stroke="#00f0f0" stroke-width="0.8" />
  </g>
  <text x="305" y="132" fill="#00f0f0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="9.5" font-weight="bold" text-anchor="middle">Sat</text>

  <!-- Zenith Reference (Z) -->
  <circle cx="250" cy="100" r="2.5" fill="#ffffff" />
  <text x="250" y="88" fill="#ffffff" font-family="monospace" font-size="9.5" font-weight="bold" text-anchor="middle">Zenith (Z)</text>

  <!-- Angle & Distance Labels -->
  <!-- Elevation labels (along vertical arcs) -->
  <text x="167" y="173" fill="#ffd700" font-family="monospace" font-size="8.5" font-style="italic" text-anchor="middle">&theta;_s</text>
  <text x="333" y="185" fill="#00f0f0" font-family="monospace" font-size="8.5" font-style="italic" text-anchor="middle">&theta;_o</text>

  <!-- Angular Separation (gamma) along S-Sat arc -->
  <text x="250" y="125" fill="#c080ff" font-family="monospace" font-size="9" font-weight="bold" text-anchor="middle">&gamma;</text>

  <!-- Azimuth separation labels -->
  <!-- Delta A at ground G -->
  <text x="250" y="244" fill="#ffffff" font-family="monospace" font-size="8.5" opacity="0.8" text-anchor="middle">&Delta;A</text>

  <!-- Explanatory math key at bottom -->
  <rect x="35" y="335" width="430" height="42" rx="4" fill="rgba(255, 255, 255, 0.01)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="0.8" />
  <text x="250" y="350" fill="#e2e8f0" font-family="monospace" font-size="8.5" text-anchor="middle">Spherical Law of Cosines (for Angular Target Separation &gamma;):</text>
  <text x="250" y="367" fill="#c080ff" font-family="monospace" font-size="9.5" font-weight="bold" text-anchor="middle">cos(&gamma;) = sin(&theta;_s)sin(&theta;_o) + cos(&theta;_s)cos(&theta;_o)cos(&Delta;A)</text>
</svg>
